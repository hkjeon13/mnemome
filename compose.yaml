services:
  api:
    container_name: mnemome-api
    build:
      context: .
      args:
        REQUIRE_LOTTE_AGENT: ${MNEMOME_REQUIRE_LOTTE_AGENT:-0}
    restart: unless-stopped
    init: true
    environment:
      MNEMOME_ENV: ${MNEMOME_ENV:-development}
      MNEMOME_STORAGE_BACKEND: ${MNEMOME_STORAGE_BACKEND:-sqlite}
      MNEMOME_DATABASE_PATH: ${MNEMOME_DATABASE_PATH:-/data/mnemome.db}
      MNEMOME_DATABASE_URL: ${MNEMOME_DATABASE_URL:-}
      MNEMOME_DB_POOL_MIN_SIZE: ${MNEMOME_DB_POOL_MIN_SIZE:-1}
      MNEMOME_DB_POOL_MAX_SIZE: ${MNEMOME_DB_POOL_MAX_SIZE:-10}
      MNEMOME_DB_COMMAND_TIMEOUT_S: ${MNEMOME_DB_COMMAND_TIMEOUT_S:-5}
      MNEMOME_VALKEY_URL: ${MNEMOME_VALKEY_URL:-}
      MNEMOME_VALKEY_PREFIX: ${MNEMOME_VALKEY_PREFIX:-mnemome:v1}
      MNEMOME_RECALL_CACHE_TTL_S: ${MNEMOME_RECALL_CACHE_TTL_S:-60}
      MNEMOME_API_KEYS: ${MNEMOME_API_KEYS:?MNEMOME_API_KEYS must be configured}
      MNEMOME_TENANT_DELEGATION_SECRET: ${MNEMOME_TENANT_DELEGATION_SECRET:-}
      MNEMOME_TENANT_DELEGATION_MAX_SKEW_S: ${MNEMOME_TENANT_DELEGATION_MAX_SKEW_S:-60}
      MNEMOME_LOG_LEVEL: ${MNEMOME_LOG_LEVEL:-INFO}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      MNEMOME_MCP_URL: ${MNEMOME_MCP_URL:-http://host.docker.internal:31046/mcp}
      MNEMOME_MCP_TOOL_ALLOWLIST: ${MNEMOME_MCP_TOOL_ALLOWLIST:-sandbox_python_execute,search_retrieve,search_detail,company_search,stock_price,market_data,company_analysis}
    ports:
      - "${MNEMOME_BIND_ADDRESS:-127.0.0.1}:${MNEMOME_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - mnemome-data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  mnemome-data:
