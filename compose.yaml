services:
  api:
    build:
      context: .
      args:
        REQUIRE_LOTTE_AGENT: ${MNEMOME_REQUIRE_LOTTE_AGENT:-0}
    restart: unless-stopped
    init: true
    environment:
      MNEMOME_ENV: ${MNEMOME_ENV:-development}
      MNEMOME_DATABASE_PATH: ${MNEMOME_DATABASE_PATH:-/data/mnemome.db}
      MNEMOME_API_KEYS: ${MNEMOME_API_KEYS:?MNEMOME_API_KEYS must be configured}
      MNEMOME_LOG_LEVEL: ${MNEMOME_LOG_LEVEL:-INFO}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      MNEMOME_MCP_URL: ${MNEMOME_MCP_URL:-https://assistant.fin-ally.net/mcp}
      MNEMOME_MCP_TOOL_ALLOWLIST: ${MNEMOME_MCP_TOOL_ALLOWLIST:-sandbox_python_execute,search_retrieve,search_detail,company_search,stock_price,market_data,company_analysis}
    ports:
      - "${MNEMOME_BIND_ADDRESS:-127.0.0.1}:${MNEMOME_PORT:-8080}:8080"
    volumes:
      - mnemome-data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  mnemome-data:
